<!-- /gameplay/demo.html -->
<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gameplay Sandbox V1.2</title>

  <style>
    :root {
      --bg: #050812;
      --panel: #0b1222;
      --text: #dff7ff;
      --subtle: #8bb8c7;
      --goal: #7CFF8A;
      --chance: #FFD95E;
      --danger: #FF6A6A;
      --accent: #00E5FF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #0a1426, var(--bg));
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      padding: 12px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(11,18,34,0.95);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .team {
      display: flex;
      flex-direction: column;
      min-width: 100px;
    }

    .team.right {
      text-align: right;
    }

    .team-name {
      font-size: 13px;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .team-score {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .center-panel {
      text-align: center;
    }

    .minute {
      font-size: 26px;
      font-weight: 800;
    }

    .momentum {
      margin-top: 4px;
      font-size: 12px;
      color: var(--subtle);
    }

    .momentum-bar {
      width: 120px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin: 6px auto 0;
    }

    .momentum-fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #FF4D8D, #00E5FF);
      transition: width 0.4s ease;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      margin-top: 10px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      background: #111;
    }

    .feed {
      margin-top: 10px;
      background: rgba(11,18,34,0.96);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 10px;
      min-height: 180px;
      max-height: 240px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .feed-entry {
      padding: 8px 10px;
      margin-bottom: 6px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.35;
      border-left: 4px solid transparent;
      background: rgba(255,255,255,0.02);
      animation: fadeIn 0.35s ease;
    }

    .feed-entry.goal {
      border-color: var(--goal);
      background: rgba(124,255,138,0.08);
    }

    .feed-entry.chance {
      border-color: var(--chance);
      background: rgba(255,217,94,0.08);
    }

    .feed-entry.danger {
      border-color: var(--danger);
      background: rgba(255,106,106,0.08);
    }

    .feed-entry.standard {
      border-color: rgba(255,255,255,0.12);
    }

    .debug {
      margin-top: 10px;
      padding: 10px;
      background: rgba(11,18,34,0.9);
      border-radius: 12px;
      font-size: 12px;
      color: var(--subtle);
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      .team-score {
        font-size: 24px;
      }

      .minute {
        font-size: 22px;
      }

      .feed {
        min-height: 160px;
      }
    }
  </style>
</head>

<body>
<div class="wrap">

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="team left">
      <span class="team-name" id="homeName">HOME</span>
      <span class="team-score" id="homeScore">0</span>
    </div>

    <div class="center-panel">
      <div class="minute" id="minuteDisplay">53'</div>

      <div class="momentum">
        Momentum
        <div class="momentum-bar">
          <div class="momentum-fill" id="momentumFill"></div>
        </div>
      </div>
    </div>

    <div class="team right">
      <span class="team-name" id="awayName">AWAY</span>
      <span class="team-score" id="awayScore">0</span>
    </div>
  </div>

  <!-- MATCH CANVAS -->
  <canvas id="pitch"></canvas>

  <!-- EVENT FEED -->
  <div class="feed" id="feed"></div>

  <!-- DEBUG -->
  <div class="debug" id="debug">
    Phase: INIT<br />
    Sequence: 0
  </div>

</div>

<script type="module">
import { gameplayConfig } from './config/gameplayConfig.js';
import { GameLoop } from './core/gameLoop.js';
import { MatchOrchestrator } from './core/matchOrchestrator.js';
import { GameplayCanvas } from './render/gameplayCanvas.js';
import { CameraController } from './render/cameraController.js';

const orchestrator = new MatchOrchestrator();
const camera = new CameraController();

const renderer = new GameplayCanvas(
  document.getElementById("pitch"),
  gameplayConfig,
  camera
);

const feed = document.getElementById("feed");

const homeScore = document.getElementById("homeScore");
const awayScore = document.getElementById("awayScore");

const homeName = document.getElementById("homeName");
const awayName = document.getElementById("awayName");

const minuteDisplay = document.getElementById("minuteDisplay");
const momentumFill = document.getElementById("momentumFill");

const debug = document.getElementById("debug");

homeName.textContent = gameplayConfig.team.home.name;
awayName.textContent = gameplayConfig.team.away.name;

function getFeedClass(type) {
  switch (type) {
    case "GOAL":
      return "goal";

    case "SHOT":
    case "THROUGH_PASS":
      return "chance";

    case "FOUL":
    case "RED_CARD":
      return "danger";

    default:
      return "standard";
  }
}

function updateMomentumBar(momentum) {
  const normalized = ((momentum + 1) / 2) * 100;
  momentumFill.style.width = `${normalized}%`;
}

function pushFeedEvent(event) {
  const row = document.createElement("div");

  row.className = `feed-entry ${getFeedClass(event.type)}`;

  row.innerHTML = `
    <strong>${event.timelineText}</strong><br />
    <span style="color: var(--subtle)">
      Momentum: ${event.momentum.toFixed(2)}
    </span>
  `;

  feed.prepend(row);
}

function updateUI(event) {
  homeScore.textContent = orchestrator.state.score.home;
  awayScore.textContent = orchestrator.state.score.away;

  minuteDisplay.textContent = `${event.minute}'`;

  updateMomentumBar(event.momentum);

  debug.innerHTML = `
    Phase: ${orchestrator.state.phase}<br />
    Sequence: ${orchestrator.state.metadata.sequenceStep}<br />
    Possession: ${orchestrator.state.metadata.possession}<br />
    Momentum: ${orchestrator.state.momentum.value.toFixed(2)}
  `;
}

const loop = new GameLoop({
  tickRate: gameplayConfig.tickRate,

  onTick: (dt) => {
    orchestrator.tick(dt);

    camera.update(dt);

    const events = orchestrator.queue.drain();

    for (const event of events) {
      if (event.camera) {
        camera.setFocus(event.camera);
      } else {
        camera.triggerEventFocus(event.type);
      }

      pushFeedEvent(event);
      updateUI(event);

      if (event.type === "THROUGH_PASS") {
        renderer.addTrail(
          [0.44, 0.38],
          event.ball,
          "pass"
        );
      }

      if (event.type === "SHOT") {
        renderer.addTrail(
          [0.82, 0.5],
          event.ball,
          "shot"
        );

        renderer.triggerHighlight(event.ball);
      }

      if (event.type === "GOAL") {
        renderer.triggerHighlight(event.ball);
      }
    }
  },

  onRender: () => {
    renderer.render(orchestrator.state);
  }
});

loop.start();
</script>
</body>
</html>

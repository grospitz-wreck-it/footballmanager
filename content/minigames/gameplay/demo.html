<!-- /gameplay/demo.html -->
<!-- Phase 1.4 Full Drop-In Upgrade -->

<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gameplay Sandbox V1.4</title>

  <style>
    :root {
      --bg: #050812;
      --panel: #0b1222;
      --text: #dff7ff;
      --subtle: #8bb8c7;
      --goal: #7CFF8A;
      --chance: #FFD95E;
      --danger: #FF6A6A;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top, #0a1426, var(--bg));
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      padding: 12px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(11,18,34,0.95);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .team {
      min-width: 100px;
    }

    .team.right {
      text-align: right;
    }

    .team-name {
      font-size: 13px;
      color: var(--subtle);
      text-transform: uppercase;
    }

    .team-score {
      font-size: 28px;
      font-weight: 800;
    }

    .minute {
      text-align: center;
      font-size: 26px;
      font-weight: 800;
    }

    .momentum-bar {
      width: 120px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }

    .momentum-fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #FF4D8D, #00E5FF);
      transition: width 0.35s ease;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      border-radius: 14px;
      background: #111;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .feed {
      margin-top: 10px;
      background: rgba(11,18,34,0.96);
      border-radius: 14px;
      padding: 10px;
      min-height: 180px;
      max-height: 260px;
      overflow-y: auto;
    }

    .feed-entry {
      padding: 8px 10px;
      margin-bottom: 6px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.35;
      border-left: 4px solid transparent;
      background: rgba(255,255,255,0.02);
    }

    .goal {
      border-color: var(--goal);
      background: rgba(124,255,138,0.08);
    }

    .chance {
      border-color: var(--chance);
      background: rgba(255,217,94,0.08);
    }

    .danger {
      border-color: var(--danger);
      background: rgba(255,106,106,0.08);
    }

    .debug {
      margin-top: 10px;
      padding: 10px;
      background: rgba(11,18,34,0.9);
      border-radius: 12px;
      font-size: 12px;
      color: var(--subtle);
    }
  </style>
</head>

<body>
<div class="wrap">

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="team left">
      <div class="team-name" id="homeName">HOME</div>
      <div class="team-score" id="homeScore">0</div>
    </div>

    <div class="center-panel">
      <div class="minute" id="minuteDisplay">53'</div>

      <div class="momentum-bar">
        <div class="momentum-fill" id="momentumFill"></div>
      </div>
    </div>

    <div class="team right">
      <div class="team-name" id="awayName">AWAY</div>
      <div class="team-score" id="awayScore">0</div>
    </div>
  </div>

  <!-- MATCH -->
  <canvas id="pitch"></canvas>

  <!-- FEED -->
  <div class="feed" id="feed"></div>

  <!-- DEBUG -->
  <div class="debug" id="debug"></div>

</div>

<script type="module">
import { gameplayConfig } from "./config/gameplayConfig.js";
import { GameLoop } from "./core/gameLoop.js";
import { MatchOrchestrator } from "./core/matchOrchestrator.js";
import { GameplayCanvas } from "./render/gameplayCanvas.js";
import { CameraController } from "./render/cameraController.js";
import { InterpolationEngine } from "./render/interpolationEngine.js";
import { DebugOverlay } from "./dev/debugOverlay.js";

const canvas = document.getElementById("pitch");

const homeScore = document.getElementById("homeScore");
const awayScore = document.getElementById("awayScore");

const homeName = document.getElementById("homeName");
const awayName = document.getElementById("awayName");

const minuteDisplay = document.getElementById("minuteDisplay");
const momentumFill = document.getElementById("momentumFill");

const feed = document.getElementById("feed");
const debugEl = document.getElementById("debug");

const camera = new CameraController();
const orchestrator = new MatchOrchestrator();

const interpolation = new InterpolationEngine();

const renderer = new GameplayCanvas(
  canvas,
  gameplayConfig,
  camera
);

const debug = new DebugOverlay(debugEl);

homeName.textContent = gameplayConfig.team.home.name;
awayName.textContent = gameplayConfig.team.away.name;

function getFeedClass(type) {
  switch (type) {
    case "GOAL":
      return "goal";

    case "SHOT":
    case "THROUGH_PASS":
    case "BIG_CHANCE":
      return "chance";

    case "FOUL":
    case "RED_CARD":
      return "danger";

    default:
      return "";
  }
}

function pushFeed(event) {
  const entry = document.createElement("div");

  entry.className = `feed-entry ${getFeedClass(event.type)}`;

  entry.innerHTML = `
    <strong>${event.minute}' ${event.timelineText}</strong><br/>
    <span style="color:#8bb8c7">
      Momentum: ${event.momentum.toFixed(2)}
    </span>
  `;

  feed.prepend(entry);
}

function updateUI(event) {
  homeScore.textContent = orchestrator.state.score.home;
  awayScore.textContent = orchestrator.state.score.away;

  minuteDisplay.textContent = `${event.minute}'`;

  const normalizedMomentum =
    ((event.momentum + 1) / 2) * 100;

  momentumFill.style.width = `${normalizedMomentum}%`;
}

const loop = new GameLoop({
  tickRate: gameplayConfig.tickRate,

  interpolationEngine: interpolation,

  debugOverlay: debug,

  onTick: (dt) => {
    orchestrator.tick(dt);

    camera.update(dt);

    interpolation.capture(orchestrator.state);

    const events = orchestrator.queue.drain();

    for (const event of events) {
      if (event.camera) {
        camera.setFocus(event.camera);
      } else {
        camera.triggerEventFocus(event.type);
      }

      if (
        event.type === "THROUGH_PASS" ||
        event.type === "PASS"
      ) {
        renderer.addTrail(
          [0.45, 0.5],
          event.ball,
          "pass"
        );
      }

      if (
        event.type === "SHOT" ||
        event.type === "BIG_CHANCE"
      ) {
        renderer.addTrail(
          [0.82, 0.5],
          event.ball,
          "shot"
        );

        renderer.triggerHighlight(event.ball);
      }

      if (event.type === "GOAL") {
        renderer.triggerHighlight(event.ball);
      }

      pushFeed(event);
      updateUI(event);
    }

    debug.updateMatchState(
      orchestrator.state,
      gameplayConfig.tickRate
    );
  },

  onRender: () => {
    const interpolated =
      interpolation.getInterpolatedState() ||
      orchestrator.state;

    renderer.render(interpolated);

    debug.render();
  },
});

loop.start();
</script>
</body>
</html>

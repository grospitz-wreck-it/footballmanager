<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="./css/tactics.css">
<link rel="stylesheet" href="./css/modal.css">
</head>

<body>

     <!-- =========================
🎮 TACTICS OVERLAY (FINAL FIX)
========================= -->
<div id="tacticsOverlay">

  <div class="tactics-sheet">

    <!-- 🧠 HEADER -->
    <div class="tactics-header">
      <img src="./gfx/taktik.webp" alt="Taktik" />
    </div>

    <!-- ⚽ FIELD -->
    <div class="formation-preview" id="formationPreview"></div>

    <!-- =========================
    📊 STATS (FIXED STRUCTURE)
    ========================= -->
    <div class="tactics-stats-row">

      <!-- DONUTS (KEIN extra wrapper!) -->
      <div id="tacticsStats"></div>

      <!-- BARS -->
      <div id="tacticsBars"></div>

    </div>

    <!-- =========================
    🎛 CONTROLS
    ========================= -->
    <div class="tactics-controls">

      <div class="tactics-dropdown" id="formationDropdown">
        <div class="dd-selected">4-4-2</div>
        <div class="dd-options">
          <div data-value="4-4-2">4-4-2</div>
          <div data-value="4-3-3">4-3-3</div>
          <div data-value="3-5-2">3-5-2</div>
          <div data-value="4-2-3-1">4-2-3-1</div>
        </div>
      </div>

      <div class="tactics-dropdown" id="presetDropdown">
        <div class="dd-selected">Balanced</div>
        <div class="dd-options">
          <div data-value="offensive">Offensiv</div>
          <div data-value="balanced">Balanced</div>
          <div data-value="defensive">Defensiv</div>
        </div>
      </div>

      <div class="tactics-dropdown" id="styleDropdown">
        <div class="dd-selected">Ausgeglichen</div>
        <div class="dd-options">
          <div data-value="balanced">Ausgeglichen</div>
          <div data-value="possession">Ballbesitz</div>
          <div data-value="counter">Konter</div>
          <div data-value="longball">Lange Bälle</div>
          <div data-value="wings">Flügelspiel</div>
        </div>
      </div>

    </div>

    <!-- 🎲 CTA -->
    <button id="chanceBtn" class="chance-btn">
      🎲 Chance im Spiel
      <span>Riskiere es!</span>
    </button>

  </div>
</div>

<!-- =========================
🟡 SPLASH
========================= -->
<div id="splash">
  <input id="nameInput" placeholder="Dein Name">

  <div id="plzSearch">
    <input id="plzInput" maxlength="3" placeholder="PLZ (z.B. 320)" />
    <div id="leagueResults"></div>
  </div>

  <select id="leagueSelect"></select>
  <select id="teamSelect"></select>
</div>

<!-- =========================
📱 APP
========================= -->
<div id="app">

  <!-- 🔝 HEADER -->
  <div id="header">
    <button id="burgerBtn">☰</button>

    <div>Kreisliga Manager</div>

    <button id="tacticsBtn" class="tactics-btn">
  <img src="./gfx/tacticsettings.webp" alt="Tactics" />
</button>
  </div>

  <!-- 🍔 SIDEBAR -->
  <div id="sidebarWrapper" class="sidebar-wrapper">
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div id="sidebar">
      <button id="saveBtn">💾 Speichern</button>
      <button id="loadBtn">📂 Laden</button>
      <button id="resetBtn">🗑 Reset</button>

      <hr>
    </div>
  </div>

  <!-- 📦 MAIN -->
  <div class="container">

    <!-- ⚽ TOP BAR -->
    <div id="topBar">
      <div id="topTeams">- vs -</div>
      <div id="topScore">0 : 0</div>
      <div id="topMinute">0'</div>
    </div>

    <!-- ⏱ PROGRESS -->
    <div id="progressBar">
      <div id="progressFill"></div>
    </div>

    <!-- 🎮 GAME -->
 <div id="gameCanvas">

  <canvas id="gameCanvasInner"></canvas>

  <!-- 🔥 GAME EVENT IMAGE (NEU) -->
  <div id="gameEventOverlay" class="hidden">
    <img id="gameEventImage" />
  </div>

  <div id="matchOverlay" class="hidden">
    <img id="overlayImage" />
    <div id="overlayText"></div>
  </div>

</div>

    <!-- 📰 EVENTS -->
    <div id="eventBar">
      <div id="eventText">Willkommen im Spiel</div>
    </div>

    <!-- ▶️ MAIN BUTTON -->
    <button id="mainButton">Spiel starten</button>

    <div id="adContainer"></div>

    <!-- 📊 TABS -->
    <div class="tabs">
      <button class="tab active" data-tab="table">Tabelle</button>
      <button class="tab" data-tab="schedule">Spieltage</button>
      <button class="tab" data-tab="team">Team</button>
    </div>

    <!-- 📊 CONTENT -->
    <div id="tabContent">

      <div id="tableView" class="tab-view">
        <div id="table">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>SP</th>
                <th>S</th>
                <th>U</th>
                <th>N</th>
                <th>Tore</th>
                <th>Diff</th>
                <th>Pkt</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="scheduleView" class="tab-view" style="display:none;"></div>
      <div id="teamView" class="tab-view" style="display:none;"></div>

    </div>

  </div>
</div>

<!-- SCRIPT -->
<script type="module" src="js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- =========================
🎮 TACTICS OVERLAY
========================= -->
<div id="tacticsOverlay" class="tactics-overlay">
  <div class="tactics-sheet">

    <h3>Taktik</h3>

    <!-- 📊 LIVE STATS -->
    <div id="tacticsStats"></div>

    <!-- 🎯 PRESETS -->
    <div class="tactics-row">
      <button data-preset="offensive">Offensiv</button>
      <button data-preset="balanced">Balanced</button>
      <button data-preset="defensive">Defensiv</button>
    </div>

    <!-- ⚡ TEMPO -->
    <div class="tactics-row">
      <button data-tempo="slow">Langsam</button>
      <button data-tempo="normal">Normal</button>
      <button data-tempo="fast">Schnell</button>
    </div>

    <!-- 🧠 PRESSING -->
    <div class="tactics-row">
      <button data-pressing="low">Tief</button>
      <button data-pressing="medium">Mittel</button>
      <button data-pressing="high">Hoch</button>
    </div>

    <!-- 🧱 DEFENSIVE LINE -->
    <div class="tactics-row">
      <button data-line="low">Tiefe Linie</button>
      <button data-line="medium">Standard</button>
      <button data-line="high">Hohe Linie</button>
    </div>

    <!-- 📐 FORMATION -->
    <div class="tactics-formation">
      <label>Formation</label>
      <select id="formationSelect">
        <option value="4-4-2">4-4-2</option>
        <option value="4-3-3">4-3-3</option>
      </select>
    </div>

    <!-- 🎲 CHANCE BUTTON -->
    <button id="chanceBtn" class="chance-btn">
      🎲 Chance erzwingen
    </button>

  </div>
</div>

<!-- =========================
🟡 SPLASH
========================= -->
<div id="splash">
  <input id="nameInput" placeholder="Dein Name">

  <div id="plzSearch">
    <input id="plzInput" maxlength="3" placeholder="PLZ (z.B. 320)" />
    <div id="leagueResults"></div>
  </div>

  <select id="leagueSelect"></select>
  <select id="teamSelect"></select>
</div>

<!-- =========================
📱 APP
========================= -->
<div id="app">

  <!-- 🔝 HEADER -->
  <div id="header">
    <button id="burgerBtn">☰</button>

    <div>Kreisliga Manager</div>

    <img 
      id="tacticsBtn" 
      src="./gfx/tacticsettings.webp" 
      class="tactics-btn"
    />
  </div>

  <!-- 🍔 SIDEBAR -->
  <div id="sidebarWrapper" class="sidebar-wrapper">
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div id="sidebar">
      <button id="saveBtn">💾 Speichern</button>
      <button id="loadBtn">📂 Laden</button>
      <button id="resetBtn">🗑 Reset</button>

      <hr>

      <select id="leagueSelectMenu"></select>
      <select id="teamSelectMenu"></select>
    </div>
  </div>

  <!-- 📦 MAIN -->
  <div class="container">

    <!-- ⚽ TOP BAR -->
    <div id="topBar">
      <div id="topTeams">- vs -</div>
      <div id="topScore">0 : 0</div>
      <div id="topMinute">0'</div>
    </div>

    <!-- ⏱ PROGRESS -->
    <div id="progressBar">
      <div id="progressFill"></div>
    </div>

    <!-- 🎮 GAME -->
    <div id="gameCanvas">

      <canvas id="gameCanvasInner"></canvas>

      <div id="matchOverlay" class="hidden">
        <img id="overlayImage" />
        <div id="overlayText"></div>
      </div>

    </div>

    <!-- 📰 EVENTS -->
    <div id="eventBar">
      <div id="eventText">Willkommen im Spiel</div>
    </div>

    <!-- ▶️ MAIN BUTTON -->
    <button id="mainButton">Spiel starten</button>

    <div id="adContainer"></div>

    <!-- 📊 TABS -->
    <div class="tabs">
      <button class="tab active" data-tab="table">Tabelle</button>
      <button class="tab" data-tab="schedule">Spieltage</button>
      <button class="tab" data-tab="team">Team</button>
    </div>

    <!-- 📊 CONTENT -->
    <div id="tabContent">

      <div id="tableView" class="tab-view">
        <div id="table">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>SP</th>
                <th>S</th>
                <th>U</th>
                <th>N</th>
                <th>Tore</th>
                <th>Diff</th>
                <th>Pkt</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <div id="scheduleView" class="tab-view" style="display:none;"></div>
      <div id="teamView" class="tab-view" style="display:none;"></div>

    </div>

  </div>
</div>

<!-- SCRIPT -->
<script type="module" src="js/main.js"></script>

</body>
</html>

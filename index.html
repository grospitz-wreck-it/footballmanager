<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="./css/main.css">
  <!-- CSS -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/team.css">
  <link rel="stylesheet" href="./css/modal.css">

  <title>Kreisliga Manager</title>
</head>

<body>

<!-- =========================
⚙️ TACTICS OVERLAY
========================= -->
<div id="tacticsOverlay" class="tactics-overlay">

  <div class="tactics-sheet">

    <h3>Taktik</h3>

    <div id="tacticsStats"></div>

    <div class="tactics-grid">

      <!-- LEFT -->
      <div class="tactics-presets">
        <button data-preset="offensive">Offensiv</button>
        <button data-preset="balanced">Balanced</button>
        <button data-preset="defensive">Defensiv</button>
      </div>

      <!-- RIGHT -->
      <div class="tactics-formation">
        <label>Formation</label>
        <select id="formationSelect">
          <option value="4-4-2">4-4-2</option>
          <option value="4-3-3">4-3-3</option>
          <option value="3-5-2">3-5-2</option>
          <option value="5-3-2">5-3-2</option>
        </select>
      </div>

      <!-- FULL WIDTH -->
      <button id="chanceBtn" class="chance-btn">
        🎲 Chance Event
      </button>

    </div>

  </div>
</div>

<!-- =========================
🟣 SPLASH SCREEN
========================= -->
<div id="splash">

  <img id="logo" src="./gfx/logo.webp">

  <div class="input-group">

    <input id="nameInput" placeholder="Manager-Name">
  </div>

  <div id="plzSearch">
    <input id="plzInput" maxlength="3" placeholder="PLZ (z.B. 320)" />
    <div id="leagueResults"></div>
  </div>

  <select id="leagueSelect"></select>
  <select id="teamSelect"></select>

  <button id="mainButton">Spiel starten</button>

</div>

<!-- =========================
🟢 APP
========================= -->
<div id="app">

  <!-- =========================
  🧷 HEADER
  ========================= -->
  <div id="header">

    <!-- LEFT -->
    <button id="burgerBtn">☰</button>

    <!-- CENTER -->
    <div class="header-center">
      <div class="header-title">Kreisliga Manager</div>
      <div id="headerUserName" class="header-user"></div>
    </div>

    <!-- RIGHT -->
    <img 
      id="tacticsBtn" 
      src="./gfx/tacticsettings.webp" 
      class="tactics-btn"
    />

  </div>

  <!-- =========================
  🍔 SIDEBAR
  ========================= -->
 <!-- =========================
🍔 SIDEBAR
========================= -->
<div id="sidebarWrapper" class="sidebar-wrapper">

  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <div id="sidebar">

    <div class="sidebar-header">
      <div class="sidebar-title">⚙️ Menü</div>
      <div class="sidebar-sub">Manager Panel</div>
    </div>

    <div class="sidebar-section">

      <button id="saveBtn" class="sb-btn">
        💾 <span>Speichern</span>
      </button>

      <button id="loadBtn" class="sb-btn">
        📂 <span>Laden</span>
      </button>

      <button id="resetBtn" class="sb-btn danger">
        🗑 <span>Neues Spiel</span>
      </button>

    </div>

  </div>

</div>
  <!-- =========================
  📦 MAIN CONTAINER
  ========================= -->
  <div class="container">

    <!-- SCORE BAR -->
    <div id="topBar">
      <div id="topTeams">- vs -</div>
      <div id="topScore">0 : 0</div>
      <div id="topMinute">0'</div>
    </div>

    <!-- PROGRESS -->
    <div id="progressBar">
      <div id="progressFill"></div>
    </div>

    <!-- GAME FIELD -->
    <div id="gameCanvas">

      <canvas id="gameCanvasInner"></canvas>

      <!-- MATCH OVERLAY -->
      <div id="matchOverlay" class="hidden">
        <img id="overlayImage" />
        <div id="overlayText"></div>
      </div>

    </div>

    <!-- EVENTS -->
    <div id="eventBar">
      <div id="eventText">Willkommen im Spiel</div>
    </div>

    <!-- MAIN BUTTON -->
    <button id="mainButton">Spiel starten</button>

    <!-- ADS -->
    <div id="adContainer"></div>

    <!-- =========================
    📊 TABS
    ========================= -->
    <div class="tabs">
      <button class="tab active" data-tab="table">Tabelle</button>
      <button class="tab" data-tab="schedule">Spieltage</button>
      <button class="tab" data-tab="team">Team</button>
    </div>

    <!-- =========================
    📄 TAB CONTENT
    ========================= -->
    <div id="tabContent">

      <!-- TABLE -->
      <div id="tableView" class="tab-view">
        <div id="table">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>SP</th>
                <th>S</th>
                <th>U</th>
                <th>N</th>
                <th>Tore</th>
                <th>Diff</th>
                <th>Pkt</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- SCHEDULE -->
      <div id="scheduleView" class="tab-view" style="display:none;"></div>

      <!-- TEAM -->
      <div id="teamView" class="tab-view" style="display:none;"></div>

    </div>

  </div>

</div>

<!-- =========================
🚀 SCRIPT
========================= -->
<script type="module" src="./js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<button id="toggleDebug" class="debugToggle"></button>

<div class="container">

<h1>📊 Ad Dashboard</h1>

<!-- TABS -->
<div class="tabs">
  <button id="tabAds" class="active">📢 Ads</button>
  <button id="tabEvents">🎮 Events</button>
  <button id="tabInsights">📈 Insights</button>
  <button id="tabGameEvents">🧠 Game</button>
</div>

<!-- ========================= -->
<!-- ADS TAB -->
<!-- ========================= -->
<div id="adsTab" class="tabContent active">

<div class="box">
  <h2>➕ Neue Kampagne</h2>
  <div class="grid">
    <input id="campaignName" placeholder="Kampagnen Name">
    <input id="campaignCustomer" placeholder="Kunde">
    <input id="campaignBudget" type="number" placeholder="Budget €">
    <input type="date" id="campaignStart">
    <input type="date" id="campaignEnd">
    <input id="campaignLink" placeholder="https://...">
    <input id="targetStates" placeholder="Bundesländer">
    <input id="targetCities" placeholder="Städte">
    <input id="targetTeams" placeholder="Teams">
    <button id="createCampaignBtn">🚀 Kampagne erstellen</button>
  </div>
</div>

<div class="box">
  <h2>🎯 Ad Type hinzufügen</h2>
  <div class="grid">
    <select id="adType">
      <option value="interstitial">Interstitial</option>
      <option value="banner">Banner</option>
      <option value="video">Rewarded Video</option>
      <option value="branded">Branded</option>
    </select>
    <input id="adPlacement" placeholder="Placement">
    <input id="freqUser" type="number" placeholder="Max pro User">
    <input id="freqDay" type="number" placeholder="Max pro Tag">
    <input id="dailyLimit" type="number" placeholder="Daily Limit">
    <button id="addAdSetBtn">➕ Ad Type hinzufügen</button>
  </div>
</div>

<div class="box">
  <h2>🖼 Assets hochladen</h2>
  <div class="grid">
    <input id="assetUpload" type="file" multiple>
    <button id="addAssetBtn">📤 Assets hinzufügen</button>
  </div>
</div>

<div class="box">
  <h2>📊 Kampagnen Übersicht</h2>
  <div id="campaignList"></div>
</div>

</div> <!-- ✅ ADS TAB ENDE -->


<!-- ========================= -->
<!-- EVENTS TAB -->
<!-- ========================= -->
<div id="eventsTab" class="tabContent">

<div class="box">
  <h2>🎮 Neues Event</h2>
  <div class="grid">
    <input id="eventTitle" placeholder="Titel">
    <textarea id="eventDescription"></textarea>

    <select id="eventScope">
      <option value="global">Global</option>
      <option value="league">Liga</option>
      <option value="team">Team</option>
    </select>

    <input id="eventScopeRef">

    <input id="eventProbability" type="number" step="0.01">
    <input id="eventDuration" type="number">

    <select id="eventEffectType">
      <option value="goal">⚽ Tor</option>
      <option value="modifier">📊 Modifier</option>
    </select>

    <select id="eventTarget">
      <option value="home">Home</option>
      <option value="away">Away</option>
    </select>

    <input id="eventValue" type="number">
    <input id="eventAttack" type="number">
    <input id="eventDefense" type="number">

    <input type="file" id="eventMedia" multiple>

    <button id="createEventBtn">🎬 Event speichern</button>
  </div>
</div>

<div class="box">
  <h2>📋 Events</h2>
  <div id="eventList"></div>
</div>

</div>


<!-- ========================= -->
<!-- INSIGHTS TAB -->
<!-- ========================= -->
<div id="insightsTab" class="tabContent">

<div class="box">
  <h2>📈 Overview</h2>
  <div class="kpiGrid">
    <div class="kpiCard"><span>DAU</span><h2 id="insightDAU">0</h2></div>
    <div class="kpiCard"><span>Sessions</span><h2 id="insightSessions">0</h2></div>
    <div class="kpiCard"><span>Matches</span><h2 id="insightMatches">0</h2></div>
    <div class="kpiCard"><span>Avg Session</span><h2 id="insightAvg">0</h2></div>
    <div class="kpiCard"><span>MPS</span><h2 id="insightMPS">0</h2></div>
    <div class="kpiCard"><span>Engagement</span><h2 id="insightEngagement">-</h2></div>
  </div>
</div>

<div class="box">
  <canvas id="insightChart"></canvas>
</div>

<div class="box">
  <div id="geoMap" style="height:400px;"></div>
  <div id="topRegions"></div>
</div>

<div class="box">
  <div id="insightMonetization"></div>
</div>

</div>


<!-- ========================= -->
<!-- GAME EVENTS TAB -->
<!-- ========================= -->
<div id="gameEventsTab" class="tabContent">

<div class="box">
  <h2>🎮 Neues Game Event</h2>

  <div class="grid">

    <input id="geTitle" placeholder="Name des Events (z.B. 'Brutales Foul')">

    <select id="geType" title="Event-Typ (z.B. goal, foul)"></select>

    <select id="geTrigger" title="Wann das Event ausgelöst wird">
      <option value="random">Random (zufällig im Spiel)</option>
      <option value="always">Always (Debug / Test)</option>
      <option value="goal">Goal (bei Tor)</option>
      <option value="foul">Foul (bei Foul)</option>
    </select>

    <div>
      <input 
        id="geProbability" 
        type="number" 
        step="0.01"
        min="0"
        max="1"
        placeholder="Chance (0–1, z.B. 0.3 = 30%)"
      >
      <small style="opacity:0.6; font-size:12px;">
        0 = nie, 1 = immer
      </small>
    </div>

    <input 
      id="geValue" 
      type="number"
      placeholder="Effektstärke (z.B. 4)"
    >

    <input 
      id="geDuration" 
      type="number"
      placeholder="Dauer in Sekunden (z.B. 3)"
    >

    <input 
      type="file" 
      id="geMedia" 
      multiple
    >

    <button id="saveGameEventBtn">💾 Speichern</button>

  </div>
</div>

<div class="box">
  <h2>📋 Game Events</h2>
  <div id="gameEventList"></div>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module" src="./js/admin.js"></script>

</body>
</html>
